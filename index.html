<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>覺知心智光譜｜了解您的原生底色</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --orange: #E8600A;
            --orange-light: #F5914A;
            --orange-pale: #FFF0E6;
            --orange-bg: #FFF8F3;
            --orange-border: #F5D0B0;
            --blue: #5B8FC9;
            --blue-pale: #EEF4FF;
            --blue-border: #C8DCF0;
            --brown-dark: #3A2010;
            --brown-mid: #7A4A2A;
            --brown-light: #B08060;
        }
        * { box-sizing: border-box; }
        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--orange-bg);
            -webkit-user-select: none; user-select: none;
        }
        input, textarea { -webkit-user-select: auto; user-select: auto; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            0%   { transform: scale(0.85); opacity: 0; }
            70%  { transform: scale(1.04); }
            100% { transform: scale(1);    opacity: 1; }
        }
        .fade-up   { animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.2) forwards; }
        .pop-in    { animation: popIn 0.4s cubic-bezier(.22,.68,0,1.2) forwards; }

        /* 捲軸隱藏 */
        .no-bar { -ms-overflow-style:none; scrollbar-width:none; }
        .no-bar::-webkit-scrollbar { display:none; }

        /* 全頁容器 */
        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部橘色 Header */
        .top-header {
            width: 100%;
            background: var(--orange);
            padding: 40px 24px 28px;
            text-align: center;
            position: relative;
        }
        .spectrum-bar {
            display: flex;
            gap: 4px;
            margin: 14px auto 0;
            max-width: 200px;
            border-radius: 4px;
            overflow: hidden;
            height: 5px;
        }

        /* 內容區 */
        .content {
            width: 100%;
            max-width: 480px;
            padding: 20px 20px 40px;
            flex: 1;
        }

        /* 卡片 */
        .card {
            background: #fff;
            border-radius: 20px;
            border: 1.5px solid var(--orange-border);
            padding: 20px;
            margin-bottom: 12px;
        }
        .card-blue {
            background: #fff;
            border-radius: 20px;
            border: 1.5px solid var(--blue-border);
            padding: 20px;
            margin-bottom: 12px;
        }

        /* 按鈕 */
        .btn-main {
            width: 100%;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-main:active { transform: scale(0.97); background: #C05008; }

        .btn-sub {
            width: 100%;
            background: var(--orange-pale);
            color: var(--orange);
            border: 1.5px solid var(--orange-border);
            border-radius: 14px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-sub:active { transform: scale(0.97); }

        .btn-ghost {
            width: 100%;
            background: transparent;
            color: var(--brown-light);
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        /* 輸入框 */
        .input-field {
            width: 100%;
            padding: 13px 14px 13px 44px;
            font-size: 15px;
            background: var(--orange-bg);
            border: 1.5px solid var(--orange-border);
            border-radius: 14px;
            outline: none;
            color: var(--brown-dark);
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: var(--orange); }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--brown-light);
        }

        /* 選項按鈕 */
        .option-btn {
            width: 100%;
            background: #fff;
            border: 1.5px solid var(--orange-border);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 10px;
        }
        .option-btn:active { transform: scale(0.98); background: var(--orange-pale); }
        .option-badge {
            background: var(--orange-pale);
            color: var(--orange);
            border-radius: 10px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        /* 分數條 */
        .score-bar-track {
            width: 100%;
            height: 8px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 4px;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1s ease-out;
        }

        /* 結果頁型別卡 */
        .type-section {
            background: #fff;
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 10px;
            border-left: 4px solid var(--orange);
        }
        .type-section.blue-accent  { border-left-color: var(--blue); }
        .type-section.green-accent { border-left-color: #4CAF7D; }
    </style>
</head>

    { label:"非常像我", score:5 },
    { label:"有點像我", score:4 },
    { label:"普通",     score:3 },
    { label:"不太像我", score:2 },

/* ── SVG 小圖示 ───── */
const Ico = {

/* ── SpectrumBar ─── */
function SpectrumBar({ label, score, color, trackColor }) {
    return (
        <div style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,color:'#7A4A2A',marginBottom:3}}>
                <span>{label}</span><span>{score}</span>
            </div>
            <div className="score-bar-track" style={{background:trackColor}}>
                <div className="score-bar-fill" style={{width:`${(score/30)*100}%`,background:color}}></div>
            </div>
        </div>
    );
}

/* ── 主程式 ─────────────────────────────────── */
function App() {
    const [step, setStep]           = useState('home');
    const [name, setName]           = useState('');
    const [email, setEmail]         = useState('');
    const [phone, setPhone]         = useState('');
    const [botTrap, setBotTrap]     = useState('');
    const [qIdx, setQIdx]           = useState(0);
    const [answers, setAnswers]     = useState({});
    const [scores, setScores]       = useState({red:0,orange:0,green:0,blue:0});
    const [total, setTotal]         = useState(0);
    const [navigating, setNav]      = useState(false);
    const [referral, setReferral]   = useState([]);
    const [refErr, setRefErr]       = useState(false);
    const [showConfirm, setConfirm] = useState(false);
    const [showSS, setShowSS]       = useState(false);
    const [engPwd, setEngPwd]       = useState('');
    const [showEng, setShowEng]     = useState(false);
    const [uid]                     = useState(()=>'u_'+Math.random().toString(36).slice(2,9));

    const sortedTypes = () =>
        ['red','orange','green','blue']
            .map(id=>({id,...TYPE_INFO[id]}))
            .sort((a,b)=>scores[b.id]-scores[a.id]);

    const reset = () => {
        setStep('home'); setName(''); setEmail(''); setPhone('');
        setQIdx(0); setAnswers({}); setScores({red:0,orange:0,green:0,blue:0});
        setTotal(0); setReferral([]); setRefErr(false);
        setConfirm(false); setShowSS(false); setShowEng(false); setEngPwd(''); setBotTrap('');
    };

    const handleIntroSubmit = (e) => {
        e.preventDefault();
        if (botTrap) return;
        if (!validPhone(phone)) { alert('請填寫正確的手機號碼（如 0912345678）'); return; }
        setStep('quiz');
    };

    const handleAnswer = (score) => {
        if (navigating) return;
        setNav(true);
        const updated = {...answers, [qIdx+1]: score};
        setAnswers(updated);
        setTimeout(()=>{
            if (qIdx < QUESTIONS.length - 1) {
                setQIdx(q=>q+1); setNav(false);
            } else {
                let t=0, sc={red:0,orange:0,green:0,blue:0};
                QUESTIONS.forEach((_,i)=>{
                    const v = (i===qIdx ? score : updated[i+1]) || 0;
                    t += v; sc[CATS[i]] += v;
                });
                setTotal(t); setScores(sc); setNav(false); setStep('contact');
            }
        }, 180);
    };

    const toggleRef = (o) => {
        setRefErr(false);
        setReferral(r => r.includes(o) ? r.filter(x=>x!==o) : [...r,o]);
    };

    const trySubmit = () => {
        if (referral.length===0) { setRefErr(true); return; }
        doSubmit();
    };

    const doSubmit = () => {
        setConfirm(false);
        setStep('result');
        if (botTrap) return;
        try {
            fetch(GOOGLE_SCRIPT_URL, {
                method:'POST', mode:'no-cors', cache:'no-cache',
                body: JSON.stringify({
                    identity:'家長', nickname:sanitize(name),
                    email, phone, totalScore:total,
                    ...scores, answers, uid,
                    submittedAt: new Date().toISOString(),
                    referral: referral.join(','),
                    source:   referral.join(','),
                })
            });
        } catch(e) { console.error(e); }
    };

    const runEngineer = () => {
        if (engPwd !== '63811') { setShowEng(false); setEngPwd(''); return; }
        const rid = Math.floor(Math.random()*9000)+1000;
        let ta={}, tt=0, ts={red:0,orange:0,green:0,blue:0};
        QUESTIONS.forEach((_,i)=>{ const v=Math.ceil(Math.random()*5); ta[i+1]=v; tt+=v; ts[CATS[i]]+=v; });
        setName(`測試員_${rid}`); setEmail(`test${rid}@example.com`);
        setPhone('0900000000'); setAnswers(ta); setTotal(tt); setScores(ts);
        setShowEng(false); setEngPwd(''); setStep('contact');
    };

    const top = sortedTypes()[0];
    const info = top ? TYPE_INFO[top.id] : null;
    const progress = Math.round(((qIdx+1)/QUESTIONS.length)*100);

    /* ━━━ 首頁 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    if (step==='home') return (
        <div className="page fade-up">
            {/* Header */}
            <div className="top-header">
                <div style={{fontSize:11,letterSpacing:'3px',color:'rgba(255,255,255,0.75)',marginBottom:6,fontWeight:600}}>覺知 SEL × 心智光譜</div>
                <div style={{fontSize:30,fontWeight:900,color:'#fff',lineHeight:1.15}}>了解您的原生底色</div>
                <div style={{fontSize:14,color:'rgba(255,255,255,0.85)',marginTop:8}}>看見自己，也看見孩子</div>
                <div className="spectrum-bar">
                    <div style={{flex:1,background:'#E84040'}}></div>
                    <div style={{flex:1,background:'#F5914A'}}></div>
                    <div style={{flex:1,background:'#4CAF7D'}}></div>
                    <div style={{flex:1,background:'#5B8FC9'}}></div>
                </div>
            </div>

            <div className="content">

                {/* 截圖提示 Modal */}
                {showSS && (
                    <div style={{position:'fixed',inset:0,background:'rgba(58,32,16,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                         onClick={()=>setShowSS(false)}>
                        <div className="card pop-in" style={{maxWidth:320,width:'100%',padding:'28px 24px',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                            <div style={{width:48,height:48,background:'#FFF0E6',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}>
                                <Ico.Camera/>
                            </div>
                            <div style={{fontSize:17,fontWeight:800,color:'#3A2010',marginBottom:8}}>請截圖保存</div>
                            <div style={{fontSize:14,color:'#B08060',lineHeight:1.65,marginBottom:20}}>
                                請使用手機截圖功能，保存您的測驗結果。
                            </div>
                            <button onClick={()=>setShowSS(false)} className="btn-main" style={{fontSize:15}}>我知道了</button>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
