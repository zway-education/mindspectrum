<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>覺知素養教育xSEL：心智光譜測驗</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --bg:        #EEF2FF;
            --surface:   #E8EDFF;
            --card:      #FFFFFF;
            --border:    #DDE3FF;
            --border-mid:#B8C4FF;
            --text-dark: #1E1B4B;
            --text-mid:  #6B7280;
            --text-light:#9CA3AF;
            --accent:    #6366F1;
            --accent-dark:#4F46E5;
            --accent-pale:#EEF2FF;
            --red:    #E53E3E;
            --orange: #DD6B20;
            --green:  #38A169;
            --blue:   #3182CE;
            --red-pale:    #FFF4F4;
            --orange-pale: #FFF6EE;
            --green-pale:  #F0FAF5;
            --blue-pale:   #EEF5FF;
            --white:   #FFFFFF;
            /* backward compat */
            --charcoal:     var(--accent);
            --charcoal-mid: var(--accent-dark);
            --yellow:       var(--accent);
            --yellow-dark:  var(--accent-dark);
            --yellow-pale:  var(--accent-pale);
            --yellow-soft:  var(--surface);
            --cream:        var(--bg);
            --blue2:        var(--accent);
            --navy:         var(--accent-dark);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            background: var(--bg);
            -webkit-user-select: none;
            user-select: none;
            color: var(--text-dark);
        }
        input, textarea { -webkit-user-select: auto; user-select: auto; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.88); opacity: 0; } 70% { transform: scale(1.03); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideIn     { from { opacity: 0; transform: translateX(16px); }  to { opacity: 1; transform: translateX(0); } }
        @keyframes slideInBack { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .fade-up       { animation: fadeUp     0.4s  cubic-bezier(.22,.68,0,1.15) both; }
        .pop-in        { animation: popIn      0.38s cubic-bezier(.22,.68,0,1.2)  both; }
        .slide-in      { animation: slideIn    0.3s  cubic-bezier(.22,.68,0,1.15) both; }
        .slide-in-back { animation: slideInBack 0.3s cubic-bezier(.22,.68,0,1.15) both; }

        @media (hover: hover) {
            .entry-card:hover    { background: var(--surface); }
            .option-btn:hover    { background: var(--accent-pale); }
            .btn-primary:hover   { background: var(--accent-dark); }
            .btn-secondary:hover { background: var(--surface); }
            .btn-outline:hover   { background: var(--surface); border-color: var(--border-mid); }
            .btn-ghost:hover     { color: var(--text-mid); }
            .identity-card:hover { background: var(--surface); border-color: var(--border-mid); }
        }

        .no-bar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-bar::-webkit-scrollbar { display: none; }

        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg);
        }

        /* ── Header: card bg + spectrum strip as top border ── */
        .top-header {
            width: 100%;
            background: var(--card);
            padding: 52px 24px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        /* ── Spectrum strip: full-width coloured top band ── */
        .spectrum-strip {
            display: flex;
            width: 100%;
            height: 8px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .content {
            width: 100%;
            max-width: 480px;
            padding: 24px 18px 64px;
            flex: 1;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(99,102,241,0.07);
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.16s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:active { transform: scale(0.97); background: var(--accent-dark); }

        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--text-dark);
            border: 1.5px solid var(--text-dark);
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.16s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:active { transform: scale(0.97); }

        .btn-outline {
            width: 100%;
            background: transparent;
            color: var(--text-mid);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .btn-outline:active { background: var(--surface); }

        .btn-ghost {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-light);
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .input-field {
            width: 100%;
            padding: 13px 14px 13px 44px;
            font-size: 15px;
            background: var(--accent-pale);
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            color: var(--text-dark);
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .entry-card {
            background: var(--card);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            transition: background 0.15s;
            border: 1px solid var(--border);
            width: 100%;
            text-align: left;
            box-shadow: 0 2px 10px rgba(99,102,241,0.06);
        }
        .entry-card:active { background: var(--surface); }

        .identity-card {
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
            box-shadow: 0 2px 10px rgba(99,102,241,0.06);
        }
        .identity-card:active { background: var(--surface); }

        /* ── Quiz option buttons ── */
        .option-btn {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 8px;
        }
        .option-btn:active { transform: scale(0.98); background: var(--surface); }

        .type-section {
            background: var(--card);
            border-radius: 0;
            padding: 16px 18px;
            margin-bottom: 10px;
            border: none;
            border-left: 3px solid var(--border);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .tag-yellow {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            background: var(--surface);
            color: var(--text-dark);
            border: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            body { background: #E0E7FF; }
            .page {
                min-height: 100vh;
                background: #E0E7FF;
                justify-content: center;
                align-items: center;
                padding: 24px;
            }
            .phone-shell {
                width: 100%;
                max-width: 520px;
                background: var(--card);
                border-radius: 32px;
                overflow: hidden;
                border: 1px solid #C7D2FE;
                box-shadow: 0 32px 80px rgba(99,102,241,0.18), 0 0 0 1px rgba(255,255,255,0.8);
                max-height: 92vh;
                display: flex;
                flex-direction: column;
            }
            .phone-content { overflow-y: auto; flex: 1; }
            .phone-content.no-bar { -ms-overflow-style: none; scrollbar-width: none; }
            .phone-content.no-bar::-webkit-scrollbar { display: none; }
            .top-header { padding: 52px 32px 36px; }
            .content { padding: 28px 24px 64px; max-width: 100%; }
            .btn-primary, .btn-secondary { font-size: 17px; padding: 18px; }
            .option-btn { padding: 17px 20px; }
            .entry-card { padding: 20px 24px; }
        }
    </style>
</head>

/* ── Spectrum strip: full-width absolute top band ── */
const SpectrumStrip = () => (
    <div className="spectrum-strip">
        <div style={{flex:1,background:'#C0392B'}}/>
        <div style={{flex:1,background:'#D46011'}}/>
        <div style={{flex:1,background:'#1E8449'}}/>
        <div style={{flex:1,background:'#1A6FA8'}}/>
    </div>
);

/* ── Score bar (light bg) ── */
function ScoreBar({ label, score, color }) {
    return (
        <div style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:600,color:'var(--text-mid)',marginBottom:5}}>
                <span>{label}</span>
                <span style={{fontVariantNumeric:'tabular-nums',fontWeight:700,color:'var(--text-dark)'}}>{score}</span>
            </div>
            <div style={{height:4,background:'var(--border)',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',background:color,width:`${(score/30)*100}%`,borderRadius:4,transition:'width 1s ease-out'}}/>
            </div>
        </div>
    );
}

/* ── Desktop detection (stable, computed once) ── */
const isDesktop = window.innerWidth >= 768;

/* ── Shell (defined outside App to keep identity stable) ── */
function Shell({children}) {
    if (!isDesktop) return (
        <div className="page fade-up">
            {children}
        </div>
    );
    return (
        <div className="page">
            <div className="phone-shell">
                <div className="phone-content no-bar">{children}</div>
            </div>
        </div>
    );
}

        if (!lookNick.trim()) { setLookErr('請填寫暱稱'); return; }

        setLookResult('loading');
        try {
            const emailParam = lookWho === 'adult' ? lookEmail.trim() : '無';
            const url = `${GOOGLE_SCRIPT_URL}?action=lookup&name=${encodeURIComponent(lookNick.trim())}&email=${encodeURIComponent(emailParam)}`;
            const res = await fetch(url);
            const txt = await res.text();
            let data;
            try { data = JSON.parse(txt); } catch(pe) { throw new Error('後端回應格式異常'); }
            if (data && data.error) { setLookResult({ error: data.error }); return; }
            if (!Array.isArray(data) || data.length === 0) { setLookResult({ error: 'not found' }); return; }
            const sortedRecords = [...data].sort((a, b) => (b.date||'').localeCompare(a.date||''));
            setLookResult({ records: sortedRecords });

            setLookResult({ error: '查詢失敗，請檢查網路連線後再試。' });

                            {phone.length>0 && !validPhone(phone) &&
                                <p style={{fontSize:12,color:'#D63030',marginTop:5,fontWeight:600}}>請填寫正確的手機號碼格式</p>}
                        </div>

                        <button type="submit" className="btn-primary">
                            {mode==='quiz'
                                ? <><Ico.Bolt/> 開始測驗</>
                                : <><Ico.Gift/> 確認領取說明</>}
                        </button>
                    </form>
                </div>

                <button onClick={reset} className="btn-ghost"><Ico.ChevronL/> 返回</button>

                <div style={{textAlign:'center',marginTop:16}}>
                    <button onClick={()=>setShowEng(true)} style={{fontSize:10,color:'var(--border)',background:'none',border:'none',cursor:'pointer'}}>工程師</button>
                </div>
            </div>

            {/* Engineer modal */}
            {showEng && (
                <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                     onClick={()=>{setShowEng(false);setEngPwd('');}}>
                    <div className="card pop-in" style={{maxWidth:300,width:'100%',padding:28}} onClick={e=>e.stopPropagation()}>
                        <div style={{fontSize:16,fontWeight:800,color:'var(--text-dark)',marginBottom:14,textAlign:'center'}}>工程師測試模式</div>
                        <input type="password" className="input-field" style={{paddingLeft:14,textAlign:'center',letterSpacing:4}}
                            placeholder="密碼" value={engPwd} onChange={e=>setEngPwd(e.target.value)}/>
                        <button onClick={runEngineer} className="btn-primary" style={{marginTop:14,fontSize:14}}>生成測試資料</button>
                    </div>
                </div>
            )}
        </Shell>
    );

    /* ─────────── QUIZ ─────────── */
    if (step==='quiz') return (
        <Shell>
            <div style={{background:'var(--card)',minHeight:'100%',display:'flex',flexDirection:'column'}}>
                {/* Progress header */}
                <div style={{background:'var(--accent-pale)',width:'100%',flexShrink:0,borderBottom:'1px solid var(--border)'}}>
                    <div style={{maxWidth:480,margin:'0 auto',padding:'12px 18px 10px'}}>
                        {/* Counter + label */}
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                            <span style={{fontSize:11,fontWeight:700,color:'var(--text-light)',letterSpacing:'1px',textTransform:'uppercase'}}>整體進度</span>
                            <span style={{fontSize:11,fontWeight:700,color:'#6366F1',fontFamily:'monospace'}}>{qIdx+1} / {QUESTIONS.length}</span>
                        </div>
                        {/* Progress bar — style5 inspired */}
                        <div style={{height:5,background:'var(--border)',border:'1px solid var(--border-mid)',borderRadius:0,overflow:'hidden'}}>
                            <div style={{height:'100%',background:'#6366F1',width:`${progress}%`,transition:'width 0.3s ease'}}/>
                        </div>
                    </div>
                </div>

                {/* Question + Options */}
                <div style={{flex:1,width:'100%',maxWidth:480,margin:'0 auto',overflowY:'auto'}} className="no-bar">
                    {/* Question card */}
                    <div className={navDir==='back' ? 'slide-in-back' : 'slide-in'} key={`q-${qIdx}-${navDir}`} style={{background:'var(--card)',padding:'20px 20px 0'}}>
                        {/* Category chip */}
                        <div style={{marginBottom:14}}>
                            <span style={{
                                fontSize:11,fontWeight:700,padding:'3px 10px',
                                background: CATS[qIdx]==='red'?'#FFF4F4':CATS[qIdx]==='orange'?'#FFF6EE':CATS[qIdx]==='green'?'#F0FAF5':'#EEF5FF',
                                color: CATS[qIdx]==='red'?'var(--red)':CATS[qIdx]==='orange'?'var(--orange)':CATS[qIdx]==='green'?'var(--green)':'var(--blue)',
                                border: `1px solid ${CATS[qIdx]==='red'?'rgba(192,57,43,0.25)':CATS[qIdx]==='orange'?'rgba(212,96,17,0.25)':CATS[qIdx]==='green'?'rgba(30,132,73,0.25)':'rgba(26,111,168,0.25)'}`,
                                borderRadius:4
                            }}>
                                {CATS[qIdx]==='red'?'開創型・紅':CATS[qIdx]==='orange'?'關懷型・橙':CATS[qIdx]==='green'?'協調型・綠':'分析型・藍'}
                            </span>
                        </div>
                        <div style={{fontSize:18,fontWeight:700,color:'var(--text-dark)',lineHeight:1.65,whiteSpace:'pre-line',paddingBottom:16,borderBottom:'2px solid var(--border)'}}>
                            {QUESTIONS[qIdx]}
                        </div>
                        <div style={{fontSize:11,color:'var(--text-light)',padding:'10px 0 4px'}}>請選擇最符合您真實狀況的選項</div>
                    </div>

                    {/* Options — table-row style */}
                    <div style={{background:'var(--card)',paddingBottom:8}}>
                        {OPTIONS.map((o,i)=>{
                            const letters = ['A','B','C','D','E'];
                            const selected = answers[qIdx+1] === o.score;
                            return (
                                <button key={o.score}
                                    className={`option-btn ${navDir==='back'?'slide-in-back':'slide-in'}`}
                                    style={{
                                        animationDelay:`${i*0.04}s`,
                                        borderRadius:0,
                                        borderLeft: selected ? '3px solid var(--accent)' : '3px solid transparent',
                                        borderRight:'none',
                                        borderBottom:'1px solid var(--border)',
                                        padding:'14px 13px 14px 13px',
                                        marginBottom:0,
                                        display:'flex',alignItems:'center',gap:12,
                                        background: selected ? 'var(--accent-pale)' : 'var(--card)',
                                        transition:'background 0.15s'
                                    }}
                                    onClick={()=>handleAnswer(o.score)} disabled={navigating}>
                                    <span style={{
                                        width:28,height:28,
                                        background: selected ? 'var(--accent)' : 'var(--accent-pale)',
                                        border: selected ? 'none' : '1px solid var(--border)',
                                        borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',
                                        fontSize:12,fontWeight:800,
                                        color: selected ? '#fff' : 'var(--accent)',
                                        flexShrink:0,fontFamily:'monospace',
                                        transition:'all 0.15s'
                                    }}>
                                        {letters[i]}
                                    </span>
                                    <span style={{fontSize:15,fontWeight: selected?700:600, color: selected?'var(--accent-dark)':'var(--text-dark)',flex:1,textAlign:'left'}}>{o.label}</span>
                                    <span style={{fontSize:12,fontWeight:700,color: selected?'var(--accent)':'var(--text-light)'}}>{o.score} 分</span>
                                </button>
                            );
                        })}
                    </div>

                    {qIdx>0 && (
                        <div style={{padding:'4px 16px 16px'}}>
                            <button onClick={()=>{ setNavDir('back'); setQIdx(q=>q-1); }} className="btn-ghost" style={{color:'var(--text-light)'}}>
                                <Ico.ChevronL/> 返回上一題
                            </button>
                        </div>
                    )}
                </div>
            </div>
        </Shell>
    );

    /* ─────────── CONTACT ─────────── */
    if (step==='contact') {
        const s = sortedTypes();
        return (
            <Shell>
                <div className="top-header">
                    <SpectrumStrip/>
                    {mode==='quiz' && <>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:8}}>
                            <div style={{display:'flex',alignItems:'flex-end',gap:3}}>
                                <div style={{width:5,height:14,background:'var(--red)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:9,background:'var(--orange)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:18,background:'var(--green)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:12,background:'var(--blue)',borderRadius:'2px 2px 0 0'}}/>
                            </div>
                            <div style={{fontSize:11,letterSpacing:'2px',color:'var(--accent)',fontWeight:700,textTransform:'uppercase'}}>測驗初步結果</div>
                        </div>
                        <div style={{fontSize:26,fontWeight:900,color:'var(--text-dark)',marginBottom:14}}>{s[0].label}</div>
                        <div style={{maxWidth:300,margin:'0 auto'}}>
                            <ScoreBar label="開創型（紅）" score={scores.red}    color="var(--red)"/>
                            <ScoreBar label="關懷型（橙）" score={scores.orange} color="var(--orange)"/>
                            <ScoreBar label="協調型（綠）" score={scores.green}  color="var(--green)"/>
                            <ScoreBar label="分析型（藍）" score={scores.blue}   color="var(--blue)"/>
                        </div>
                    </>}
                    {mode==='direct' && <>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:10}}>
                            <div style={{display:'flex',alignItems:'flex-end',gap:3}}>
                                <div style={{width:5,height:14,background:'var(--red)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:9,background:'var(--orange)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:18,background:'var(--green)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:12,background:'var(--blue)',borderRadius:'2px 2px 0 0'}}/>
                            </div>
                            <div style={{fontSize:11,letterSpacing:'2px',color:'var(--accent)',fontWeight:700,textTransform:'uppercase'}}>領取心智光譜說明</div>
                        </div>
                        <div style={{fontSize:26,fontWeight:900,color:'var(--text-dark)',marginBottom:6}}>確認您的資料</div>
                        <div style={{fontSize:13,color:'var(--text-mid)'}}>說明將寄至您填寫的 Email</div>
                    </>}
                </div>

                <div className="content">
                    <div className="card" style={{padding:'22px'}}>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--green)',marginBottom:16,display:'flex',alignItems:'center',gap:6}}>
                            <Ico.Check/> 確認資料
                        </div>

                        <div style={{marginBottom:12}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>姓名</label>
                            <input className="input-field" style={{paddingLeft:14}} value={name} onChange={e=>setName(e.target.value)} placeholder="您的姓名"/>
                        </div>
                        <div style={{marginBottom:12}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>
                                Email <span style={{fontWeight:400,color:'var(--text-light)'}}>（說明寄送用）</span>
                            </label>
                            <input className="input-field" style={{paddingLeft:14}} value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@mail.com"/>
                        </div>
                        <div>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:6}}>聯繫電話</label>
                            <input className="input-field" style={{paddingLeft:14}} value={phone}
                                onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,10))} placeholder="09xxxxxxxx" maxLength="10"/>
                        </div>
                    </div>

                    <button onClick={()=>{
                        if(!name||!email.includes('@')||!validPhone(phone)){alert('請填寫完整聯絡資料');return;}
                        setConfirm(true);
                    }} className="btn-primary" style={{marginBottom:10}}>
                        確認並領取分析說明
                    </button>
                    <button onClick={reset} className="btn-ghost">返回首頁</button>
                </div>

                {/* Confirm modal */}
                {showConfirm && (
                    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                         onClick={()=>setConfirm(false)}>
                        <div className="card pop-in" style={{maxWidth:360,width:'100%',padding:'28px 24px'}} onClick={e=>e.stopPropagation()}>
                            <div style={{textAlign:'center',marginBottom:18}}>
                                <div style={{width:52,height:52,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1.5px solid var(--border)'}}>
                                    <Ico.Mail/>
                                </div>
                                <div style={{fontSize:18,fontWeight:800,color:'var(--text-dark)'}}>確認送出</div>
                                <div style={{fontSize:13,color:'var(--text-mid)',marginTop:6,lineHeight:1.6}}>
                                    說明將寄至 <span style={{color:'var(--charcoal)',fontWeight:800}}>{email}</span>
                                </div>
                            </div>

                            {/* Referral */}
                            <div style={{background:refErr?'#FFF5F5':'var(--surface)',borderRadius:16,padding:'16px',border:refErr?'1.5px solid #FECACA':'1.5px solid var(--border)',marginBottom:16}}>
                                <div style={{fontSize:13,fontWeight:700,color:refErr?'#D63030':'var(--text-dark)',marginBottom:10}}>
                                    如何得知本測驗？<span style={{fontSize:11,fontWeight:400,color:'var(--text-light)',marginLeft:4}}>(必填)</span>
                                </div>
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                    {REFERRAL_OPTIONS.map(o=>(
                                        <button key={o} onClick={()=>toggleRef(o)} style={{
                                            padding:'9px 10px',borderRadius:10,fontSize:12,fontWeight:700,
                                            border: referral.includes(o)?'2px solid var(--accent)':'1.5px solid var(--border)',
                                            background: referral.includes(o)?'var(--accent)':'var(--card)',
                                            color: referral.includes(o)?'#fff':'var(--text-mid)',
                                            cursor:'pointer',display:'flex',alignItems:'center',gap:6,
                                            transition:'all 0.15s'
                                        }}>
                                            <div style={{width:12,height:12,borderRadius:3,border:referral.includes(o)?'1.5px solid rgba(255,255,255,0.3)':'1.5px solid var(--border)',background:referral.includes(o)?'rgba(255,255,255,0.15)':'transparent',flexShrink:0}}/>
                                            {o}
                                        </button>
                                    ))}
                                </div>
                                {refErr && <div style={{fontSize:11,color:'#D63030',marginTop:8,fontWeight:600}}>※ 請至少選擇一項</div>}
                            </div>

                            <button onClick={trySubmit} className="btn-primary">確認送出</button>
                            <button onClick={()=>setConfirm(false)} style={{width:'100%',marginTop:10,padding:11,background:'var(--surface)',border:'none',borderRadius:12,fontSize:13,fontWeight:600,color:'var(--text-mid)',cursor:'pointer'}}>返回修改</button>
                        </div>
                    </div>
                )}
            </Shell>
        );
    }

    /* ─────────── RESULT ─────────── */
    if (step==='result') {
        const s = sortedTypes();
        const domId   = s[0]?.id || 'blue';
        const domInfo = TYPE_INFO[domId];
        const dynStyle = {
            '--accent':      domInfo.barColor,
            '--accent-dark': domInfo.darkColor,
            '--accent-pale': domInfo.bgColor,
            '--border':      domInfo.borderColor,
        };
        return (
            <Shell>
              <div style={dynStyle}>
                <div className="top-header" style={{paddingBottom:32, background: domInfo.bgColor, borderBottom:`1px solid ${domInfo.borderColor}`}}>
                    {/* Dominant colour strip at top */}
                    <div style={{position:'absolute',top:0,left:0,width:'100%',height:6,background:`linear-gradient(90deg,${TYPE_INFO.red.barColor},${TYPE_INFO.orange.barColor},${TYPE_INFO.green.barColor},${TYPE_INFO.blue.barColor})`}}/>

                    <div style={{width:52,height:52,background:`${domInfo.barColor}18`,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:`1.5px solid ${domInfo.borderColor}`}}>
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={domInfo.barColor} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>

                    {mode==='quiz' ? <>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:8}}>
                            <div style={{display:'flex',alignItems:'flex-end',gap:3}}>
                                {s.map(t=>(
                                    <div key={t.id} style={{width:5, height: t.id===domId?22:Math.round(8+scores[t.id]/30*10), background:TYPE_INFO[t.id].barColor, borderRadius:'2px 2px 0 0', transition:'height 0.4s ease'}}/>
                                ))}
                            </div>
                            <div style={{fontSize:11,letterSpacing:'2px',color:domInfo.barColor,fontWeight:700,textTransform:'uppercase'}}>您的心智光譜</div>
                        </div>
                        <div style={{fontSize:22,fontWeight:900,color:'var(--text-dark)',marginBottom:6,lineHeight:1.3}}>{info.title}</div>
                        <div style={{fontSize:13,color:'var(--text-mid)',marginBottom:16}}>資料已成功提交！說明將寄至您的信箱</div>
                        <div style={{maxWidth:300,margin:'0 auto'}}>
                            <ScoreBar label="開創型（紅）" score={scores.red}    color="var(--red)"/>
                            <ScoreBar label="關懷型（橙）" score={scores.orange} color="var(--orange)"/>
                            <ScoreBar label="協調型（綠）" score={scores.green}  color="var(--green)"/>
                            <ScoreBar label="分析型（藍）" score={scores.blue}   color="var(--blue)"/>
                        </div>
                    </> : <>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:8}}>
                            <div style={{display:'flex',alignItems:'flex-end',gap:3}}>
                                <div style={{width:5,height:14,background:'var(--red)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:9,background:'var(--orange)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:18,background:'var(--green)',borderRadius:'2px 2px 0 0'}}/>
                                <div style={{width:5,height:12,background:'var(--blue)',borderRadius:'2px 2px 0 0'}}/>
                            </div>
                            <div style={{fontSize:11,letterSpacing:'2px',color:domInfo.barColor,fontWeight:700,textTransform:'uppercase'}}>領取成功</div>
                        </div>
                        <div style={{fontSize:26,fontWeight:900,color:'var(--text-dark)',marginBottom:6}}>心智光譜說明</div>
                        <div style={{fontSize:13,color:'var(--text-mid)'}}>說明已寄至 {email}</div>
                    </>}
                </div>

                <div className="content">
                    {/* Type info sections */}
                    {mode==='quiz' && info && (
                        <div style={{marginBottom:16}}>
                            <div className="type-section" style={{borderLeftColor:'var(--red)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--red)',letterSpacing:1.5,marginBottom:7,textTransform:'uppercase'}}>壓力下的表現</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.75}}>{info.stress}</div>
                            </div>
                            <div className="type-section" style={{borderLeftColor:'var(--blue)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',letterSpacing:1.5,marginBottom:7,textTransform:'uppercase'}}>您的優勢</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.75}}>{info.strength}</div>
                            </div>
                            <div className="type-section" style={{borderLeftColor:'var(--green)'}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--green)',letterSpacing:1.5,marginBottom:7,textTransform:'uppercase'}}>覺知練習</div>
                                <div style={{fontSize:14,color:'var(--text-dark)',lineHeight:1.75}}>{info.practice}</div>
                            </div>
                        </div>
                    )}

                    {/* 分齡建議 */}
                    {mode==='quiz' && childAge && AGE_TIPS[childAge] && (
                        <div className="card fade-up" style={{padding:'22px',marginBottom:16,borderTop:'3px solid var(--accent)'}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                                <div style={{width:32,height:32,background:'var(--accent-pale)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="2.2" strokeLinecap="round"><path d="M12 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/><path d="M19 21v-2a7 7 0 0 0-14 0v2"/></svg>
                                </div>
                                <div>
                                    <div style={{fontSize:13,fontWeight:900,color:'var(--text-dark)'}}>
                                        {AGE_GROUPS.find(a=>a.key===childAge)?.label} 適齡練習
                                    </div>
                                    <div style={{fontSize:11,color:'var(--accent)',fontWeight:700}}>
                                        {AGE_GROUPS.find(a=>a.key===childAge)?.sublabel}
                                    </div>
                                </div>
                            </div>
                            <div style={{display:'flex',flexDirection:'column',gap:10}}>
                                {AGE_TIPS[childAge].map((tip,i)=>(
                                    <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                                        <div style={{width:20,height:20,borderRadius:'50%',background:'var(--accent)',color:'#fff',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                                            {i+1}
                                        </div>
                                        <div style={{fontSize:13,color:'var(--text-dark)',lineHeight:1.7}}>{tip}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {mode==='direct' && (
                        <div className="card" style={{textAlign:'center',padding:'28px 22px',marginBottom:16}}>
                            <div style={{width:56,height:56,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1.5px solid var(--border)'}}>
                                <Ico.Inbox/>
                            </div>
                            <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>說明已寄出！</div>
                            <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.8}}>
                                請至 <span style={{fontWeight:800,color:'var(--charcoal)'}}>{email}</span> 查收<br/>
                                若未收到，請檢查垃圾郵件信箱
                            </div>
                        </div>
                    )}

                    {/* LINE */}
                    <a href={LINE_ADD_FRIEND_URL} target="_blank" rel="noopener noreferrer"
                       style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',background:'#06C755',color:'#fff',borderRadius:14,padding:'15px',fontWeight:700,fontSize:15,textDecoration:'none',marginBottom:10,boxShadow:'0 4px 16px rgba(6,199,85,0.28)'}}>
                        <Ico.Line/> 加入 LINE，接收更多資訊
                    </a>

                    {mode==='direct' && (
                        <button onClick={()=>{setMode('quiz');setStep('quiz');}}
                            className="btn-primary" style={{marginBottom:10}}>
                            <Ico.Bolt/> 也來做個測驗吧
                        </button>
                    )}

                    {/* 帶孩子測驗 */}
                    <a href={CHILD_VERSION_URL} target="_blank" rel="noopener noreferrer"
                       style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',background:'var(--card)',color:'var(--text-mid)',border:'1.5px solid var(--border)',borderRadius:14,padding:'13px',fontWeight:700,fontSize:14,textDecoration:'none',marginBottom:10,boxShadow:'0 1px 6px rgba(45,45,45,0.06)'}}>
                        <Ico.Smile/> 帶孩子也來測測看 →
                    </a>

                    {/* 分享成果 */}
                    {(()=>{
                        const shareUrl  = name ? `${QUIZ_SHARE_URL}?ref=${encodeURIComponent(name)}` : QUIZ_SHARE_URL;
                        const shareText = `我是「${domInfo.label}」家長！\n在教養壓力下，我的直覺反應揭露了我的底色。\n你是哪種底色的家長？快來測測看！\n${shareUrl}`;
                        const lineUrl   = `https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`;
                        const fbUrl     = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`;
                        const doNativeShare = async () => {
                            if (navigator.share) {
                                try { await navigator.share({ title:'覺知心智光譜', text:`我是「${domInfo.label}」家長！在教養壓力下，我的直覺反應揭露了我的底色。你是哪種底色的家長？快來測測看！`, url: shareUrl }); }
                                catch(e) {}
                            } else { setShowShare(true); }
                        };
                        const doCopy = async () => {
                            try { await navigator.clipboard.writeText(shareUrl); setCopied(true); setTimeout(()=>setCopied(false),2000); }
                            catch(e) {}
                        };
                        return (
                            <div style={{marginBottom:10}}>
                                {/* 平台快捷列 */}
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
                                    {/* LINE */}
                                    <a href={lineUrl} target="_blank" rel="noopener noreferrer"
                                        style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,padding:'12px 4px',background:'#06C755',borderRadius:14,textDecoration:'none',color:'#fff',boxShadow:'0 3px 10px rgba(6,199,85,0.30)'}}>
                                        <Ico.Line/>
                                        <span style={{fontSize:10,fontWeight:700}}>LINE</span>
                                    </a>
                                    {/* Facebook */}
                                    <a href={fbUrl} target="_blank" rel="noopener noreferrer"
                                        style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,padding:'12px 4px',background:'#1877F2',borderRadius:14,textDecoration:'none',color:'#fff',boxShadow:'0 3px 10px rgba(24,119,242,0.30)'}}>
                                        <Ico.Fb/>
                                        <span style={{fontSize:10,fontWeight:700}}>Facebook</span>
                                    </a>
                                    {/* IG: 透過系統分享 */}
                                    <button onClick={doNativeShare}
                                        style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,padding:'12px 4px',background:'linear-gradient(145deg,#f9a34c,#e1306c,#833ab4)',borderRadius:14,border:'none',cursor:'pointer',color:'#fff',boxShadow:'0 3px 10px rgba(225,48,108,0.30)'}}>
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="#fff" stroke="none"/></svg>
                                        <span style={{fontSize:10,fontWeight:700}}>Instagram</span>
                                    </button>
                                    {/* 複製連結 */}
                                    <button onClick={doCopy}
                                        style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,padding:'12px 4px',background:copied?'#2E8B5A':'var(--surface)',borderRadius:14,border:`1.5px solid ${copied?'#2E8B5A':'var(--border-mid)'}`,cursor:'pointer',transition:'all 0.2s',color:copied?'#fff':'var(--text-dark)',boxShadow:copied?'0 3px 10px rgba(46,139,90,0.28)':'0 1px 4px rgba(99,102,241,0.08)'}}>
                                        {copied ? <Ico.Check/> : <Ico.Copy/>}
                                        <span style={{fontSize:10,fontWeight:700}}>{copied?'已複製':'複製連結'}</span>
                                    </button>
                                </div>
                            </div>
                        );
                    })()}

                    {/* 截圖 */}
                    <button onClick={()=>setShowSS(true)}
                        style={{width:'100%',background:'var(--card)',color:'var(--text-mid)',border:'1.5px solid var(--border)',borderRadius:12,padding:'12px',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,boxShadow:'0 1px 4px rgba(45,45,45,0.05)',marginBottom:10}}>
                        <Ico.Camera/> 截圖保存
                    </button>

                    <button onClick={reset} className="btn-ghost">
                        <Ico.Restart/> 重新開始
                    </button>
                </div>

                {/* Screenshot hint modal */}
                {showSS && (
                    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:99,padding:20}}
                         onClick={()=>setShowSS(false)}>
                        <div className="card pop-in" style={{maxWidth:300,width:'100%',padding:'32px 24px',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
                            <div style={{width:56,height:56,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1.5px solid var(--border)'}}>
                                <Ico.Camera/>
                            </div>
                            <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>請截圖保存</div>
                            <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.75,marginBottom:22}}>
                                請使用手機截圖功能，<br/>保存您的測驗結果。
                            </div>
                            <button onClick={()=>setShowSS(false)} className="btn-primary">我知道了</button>
                        </div>
                    </div>
                )}
              </div>{/* end dynStyle wrapper */}
            </Shell>
        );
    }

    /* ─────────── LOOKUP ─────────── */
    if (step==='lookup') return (
        <Shell>
            <div className="top-header">
                <SpectrumStrip/>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:10}}>
                    <div style={{display:'flex',alignItems:'flex-end',gap:3}}>
                        <div style={{width:5,height:14,background:'var(--red)',borderRadius:'2px 2px 0 0'}}/>
                        <div style={{width:5,height:9,background:'var(--orange)',borderRadius:'2px 2px 0 0'}}/>
                        <div style={{width:5,height:18,background:'var(--green)',borderRadius:'2px 2px 0 0'}}/>
                        <div style={{width:5,height:12,background:'var(--blue)',borderRadius:'2px 2px 0 0'}}/>
                    </div>
                    <div style={{fontSize:11,letterSpacing:'2px',color:'var(--accent)',fontWeight:700,textTransform:'uppercase'}}>歷史紀錄查詢</div>
                </div>
                <div style={{fontSize:26,fontWeight:900,color:'var(--text-dark)',marginBottom:8}}>查詢過往測驗紀錄</div>
                <div style={{fontSize:13,color:'var(--text-mid)',lineHeight:1.6}}>請填寫當時測驗所填的資料</div>
            </div>

            <div className="content">
                {/* Step 1: Choose identity */}
                {!lookWho && lookResult === null && (
                    <div style={{marginBottom:16}}>
                        <div style={{fontSize:13,fontWeight:700,color:'var(--text-mid)',marginBottom:14,textAlign:'center'}}>請選擇您要查詢哪一筆紀錄</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                            <button onClick={()=>setLookWho('adult')} className="identity-card" style={{
                                padding:'24px 12px',borderRadius:20,border:'1.5px solid var(--border)',
                                background:'var(--card)',cursor:'pointer',textAlign:'center',transition:'all 0.15s',
                                boxShadow:'0 2px 10px rgba(45,45,45,0.06)'
                            }}>
                                <div style={{width:56,height:56,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1.5px solid var(--border)',color:'var(--text-dark)'}}>
                                    <Ico.PersonAdult/>
                                </div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--text-dark)',marginBottom:4}}>家長紀錄</div>
                                <div style={{fontSize:11,color:'var(--text-light)'}}>以 Email 查詢</div>
                            </button>
                            <button onClick={()=>setLookWho('child')} className="identity-card" style={{
                                padding:'24px 12px',borderRadius:20,border:'1.5px solid var(--border)',
                                background:'var(--card)',cursor:'pointer',textAlign:'center',transition:'all 0.15s',
                                boxShadow:'0 2px 10px rgba(45,45,45,0.06)'
                            }}>
                                <div style={{width:56,height:56,background:'#F0FAF4',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',border:'1.5px solid rgba(46,139,90,0.2)',color:'#2E8B5A'}}>
                                    <Ico.PersonChild/>
                                </div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--text-dark)',marginBottom:4}}>孩子紀錄</div>
                                <div style={{fontSize:11,color:'var(--text-light)'}}>以暱稱查詢</div>
                            </button>
                        </div>
                    </div>
                )}

                {/* Step 2: Fill in form */}
                {lookWho && (lookResult === null || lookResult === 'loading') && (
                    <div className="card" style={{padding:'24px 22px'}}>
                        {/* Identity header */}
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
                            <div style={{width:36,height:36,borderRadius:'50%',background:lookWho==='adult'?'var(--surface)':'var(--green-pale)',display:'flex',alignItems:'center',justifyContent:'center',border:lookWho==='adult'?'1.5px solid var(--border)':'1.5px solid rgba(30,132,73,0.2)',color:lookWho==='adult'?'var(--text-dark)':'var(--green)',flexShrink:0}}>
                                {lookWho==='adult' ? <Ico.PersonAdult/> : <Ico.PersonChild/>}
                            </div>
                            <div>
                                <div style={{fontSize:14,fontWeight:800,color:'var(--text-dark)'}}>{lookWho==='adult'?'家長版紀錄':'孩子版紀錄'}</div>
                                <button onClick={()=>{setLookWho(null);setLookErr('');setLookResult(null);setLookNick('');setLookEmail('');setLookChild('');}}
                                    style={{fontSize:11,color:'var(--text-light)',background:'none',border:'none',cursor:'pointer',padding:0,marginTop:2}}>
                                    切換身份 →
                                </button>
                            </div>
                        </div>

                        {/* Nickname */}
                        <div style={{marginBottom:14}}>
                            <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:7}}>當時填寫的暱稱</label>
                            <div className="input-wrap">
                                <span className="input-icon"><Ico.User/></span>
                                <input type="text" className="input-field" placeholder="例如：王小明"
                                    value={lookNick} onChange={e=>setLookNick(e.target.value)}/>
                            </div>
                        </div>

                        {/* Email / Child email */}
                        {lookWho==='adult' ? (
                            <div style={{marginBottom:22}}>
                                <label style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'block',marginBottom:7}}>
                                    家長 Email
                                    <span style={{fontSize:11,fontWeight:400,color:'var(--text-light)',marginLeft:4}}>（當時填寫的信箱）</span>
                                </label>
                                <div className="input-wrap">
                                    <span className="input-icon"><Ico.Mail/></span>
                                    <input type="email" className="input-field" placeholder="example@mail.com"
                                        value={lookEmail} onChange={e=>setLookEmail(e.target.value)}/>
                                </div>
                            </div>
                        ) : (
                            <div style={{background:'var(--surface)',borderRadius:12,padding:'12px 14px',marginBottom:22,border:'1px solid var(--border)'}}>
                                <div style={{fontSize:12,fontWeight:700,color:'var(--text-mid)',display:'flex',alignItems:'center',gap:6}}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                                    孩子版紀錄只需填寫暱稱即可查詢
                                </div>
                            </div>
                        )}

                        {lookErr && (
                            <div style={{fontSize:12,color:'#D63030',marginBottom:12,fontWeight:600,padding:'10px 12px',background:'#FFF5F5',borderRadius:10,border:'1px solid #FECACA',display:'flex',alignItems:'center',gap:6}}>
                                <Ico.Warning/> {lookErr}
                            </div>
                        )}

                        <button className="btn-primary" onClick={doLookup} disabled={lookResult==='loading'}
                            style={{opacity:lookResult==='loading'?0.7:1}}>
                            {lookResult==='loading'
                                ? <><span style={{display:'inline-block',width:16,height:16,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin 0.7s linear infinite'}}/> 查詢中…</>
                                : <><Ico.Search/> 立即查詢紀錄</>}
                        </button>
                    </div>
                )}

                {/* Error / Not found */}
                {lookResult && lookResult !== 'loading' && lookResult.error && (
                    <div className="card" style={{padding:'28px 22px',textAlign:'center'}}>
                        <div style={{width:64,height:64,background:'var(--surface)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px',border:'1.5px solid var(--border)',color:'var(--text-light)'}}>
                            <Ico.SearchOff/>
                        </div>
                        <div style={{fontSize:17,fontWeight:800,color:'var(--text-dark)',marginBottom:8}}>查無紀錄</div>
                        <div style={{fontSize:14,color:'var(--text-mid)',lineHeight:1.75,marginBottom:22,whiteSpace:'pre-line'}}>
                            {lookResult.error === 'missing parameters' || lookResult.error === 'not found'
                                ? '找不到符合的測驗紀錄，\n請確認填寫的資料是否正確。'
                                : lookResult.error}
                        </div>
                        <button className="btn-outline" onClick={()=>setLookResult(null)}>重新查詢</button>
                    </div>
                )}

                {/* Success result — array of records */}
                {lookResult && lookResult !== 'loading' && lookResult.records && (
                    <div>
                        {/* Header */}
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,padding:'14px 16px',background:'var(--green-pale)',borderRadius:16,border:'1.5px solid #9BE3BF'}}>
                            <div style={{width:32,height:32,background:'var(--green)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                            <div>
                                <div style={{fontSize:15,fontWeight:800,color:'var(--green)'}}>找到 {lookResult.records.length} 筆紀錄</div>
                                <div style={{fontSize:11,color:'var(--green)',opacity:0.7,marginTop:1}}>依時間由新到舊排列</div>
                            </div>
                        </div>

                        {/* Each record */}
                        {lookResult.records.map((r, i) => {
                            const sc = {
                                red:    Number(r.scores?.red    ?? r.red    ?? 0),
                                orange: Number(r.scores?.orange ?? r.orange ?? 0),
                                green:  Number(r.scores?.green  ?? r.green  ?? 0),
                                blue:   Number(r.scores?.blue   ?? r.blue   ?? 0),
                            };
                            const domId = Object.entries(sc).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'blue';
                            const typeLabel = {red:'開創型（紅）', orange:'關懷型（橙）', green:'協調型（綠）', blue:'分析型（藍）'};
                            const typeColor = {red:'#D63030', orange:'#E8600A', green:'#2E8B5A', blue:'#3A70B0'};
                            const typeBg    = {red:'#FFF0F0', orange:'#FFF0E6', green:'#F0FAF4', blue:'#EEF4FF'};
                            return (
                                <div key={i} className="card" style={{marginBottom:12,padding:'20px',borderTop:`3px solid ${typeColor[domId]}`}}>
                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                                        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:typeBg[domId],borderRadius:20,padding:'4px 12px'}}>
                                            <div style={{width:8,height:8,borderRadius:'50%',background:typeColor[domId]}}/>
                                            <span style={{fontSize:12,fontWeight:800,color:typeColor[domId]}}>{typeLabel[domId]}</span>
                                        </div>
                                        <div style={{fontSize:11,color:'var(--text-light)',fontWeight:600}}>{r.date || '—'}</div>
                                    </div>
                                    {[
                                        {key:'red',   label:'開創型（紅）', color:'#D63030'},
                                        {key:'orange',label:'關懷型（橙）', color:'#E8600A'},
                                        {key:'green', label:'協調型（綠）', color:'#2E8B5A'},
                                        {key:'blue',  label:'分析型（藍）', color:'#3A70B0'},
                                    ].map(t=>(
                                        <div key={t.key} style={{marginBottom:9}}>
                                            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,fontWeight:700,color:'var(--text-dark)',marginBottom:4}}>
                                                <span>{t.label}</span>
                                                <span style={{color:t.color,fontVariantNumeric:'tabular-nums'}}>{sc[t.key]}</span>
                                            </div>
                                            <div style={{height:5,background:'var(--surface)',borderRadius:4,overflow:'hidden',border:'1px solid var(--border)'}}>
                                                <div style={{height:'100%',background:t.color,width:`${(sc[t.key]/30)*100}%`,borderRadius:4,transition:'width 1s ease-out'}}/>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })}

                        <button className="btn-outline" onClick={()=>{setLookResult(null);setLookWho(null);setLookNick('');setLookEmail('');setLookChild('');}} style={{marginBottom:8}}>
                            再查一筆
                        </button>
                    </div>
                )}

                <button onClick={reset} className="btn-ghost"><Ico.ChevronL/> 返回首頁</button>
            </div>

            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </Shell>
    );

    return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
